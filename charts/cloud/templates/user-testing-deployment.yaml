{{- if .Values.userTesting.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ent-cloud-ut
  labels:
    {{- include "protopie.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: ent-cloud-ut
  template:
    metadata:
      labels:
        app: ent-cloud-ut
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- .Values.imagePullSecrets | toYaml | nindent 8 }}
      {{- else if .Values.imageCredentials }}
      imagePullSecrets:
      - name: protopie-private-registry
      {{- end }}
      containers:
        - name: ent-cloud-ut
          image: "{{ .Values.image.cloud.userTesting.repository }}:{{ .Values.image.cloud.userTesting.tag }}"
          imagePullPolicy: {{ .Values.image.cloud.userTesting.pullPolicy }}
          env:
            - name: API_URL
              value: "http://ent-cloud-api-svc.{{ .Release.Namespace }}.svc.{{ include "protopie.clusterDomain" . }}"
            - name: HOST
              value: 0.0.0.0
            - name: SOCKETIO_HOST
              value: 0.0.0.0
            - name: KTOR_ENV
              value: production
          ports:
            - containerPort: 4444
            - containerPort: 4445
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          resources:
            {{- toYaml .Values.userTesting.resources | nindent 16 }}
      volumes:
        - name: logs
          hostPath:
            path: /home/ec2-user/logs
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: ent-cloud-ut-svc
spec:
  selector:
    app: ent-cloud-ut
  ports:
    - name: cloud-ut-api
      port: 80
      targetPort: 4444
    - name: cloud-ut-socket
      port: 8081
      targetPort: 4445
{{- end }}
