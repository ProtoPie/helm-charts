apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "protopie.fullname" . }}-test-connection"
  labels:
    {{- include "protopie.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:
        - '-qO-'
        - 'nginx.{{ .Release.Namespace }}.svc.{{ include "protopie.clusterDomain" . }}'
        - 'ent-cloud-api-svc.{{ .Release.Namespace }}.svc.{{ include "protopie.clusterDomain" . }}'
  restartPolicy: Never
